<!DOCTYPE html>
<html>
<head>
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
<title>KAKON</title>
<style>
body, html {
  height: 100%;
  margin: 0;
  font-family: "Helvetica Neue", Arial, sans-serif;
  background-color: black;
  overflow: hidden; /* Safe to put this back now! */
}

.bg {
  background-image: url("/hello.gif");
  height: 100vh; 
  width: 100vw;
  background-position: center;
  background-repeat: no-repeat;
  background-size: cover;
  
  display: flex;
  justify-content: center;
  align-items: center;
}

/* The breathing animation now uses bulletproof 2D scaling and rotation */
.tunnel {
  position: relative;
  width: 100%;
  height: 100%;
  animation: breathe 6s infinite alternate ease-in-out;
}

.tunnel span {
  position: absolute;
  left: 50%;
  /* Removed top: 50% from here so we can control it individually below */
  color: pink;
  font-weight: 900;
  font-size: clamp(60px, 20vw, 150px); /* Massive base font size */
  letter-spacing: 1vw; 
  text-transform: uppercase;
  white-space: nowrap;
}

/* THE BULLETPROOF TUNNEL FIX:
  Instead of 3D depth, we scale the back words down and push them 
  slightly higher on the screen so they peek out, creating a perfect fake 3D tunnel!
*/
.tunnel span:nth-child(1) { 
  transform: translate(-50%, -85%) scale(0.2); 
  opacity: 0.15; filter: blur(8px); 
}
.tunnel span:nth-child(2) { 
  transform: translate(-50%, -75%) scale(0.35); 
  opacity: 0.3; filter: blur(5px); 
}
.tunnel span:nth-child(3) { 
  transform: translate(-50%, -65%) scale(0.55); 
  opacity: 0.5; filter: blur(3px); 
}
.tunnel span:nth-child(4) { 
  transform: translate(-50%, -56%) scale(0.75); 
  opacity: 0.8; filter: blur(1px); 
}
.tunnel span:nth-child(5) { 
  transform: translate(-50%, -48%) scale(1); 
  opacity: 1; 
  text-shadow: 0 0 25px rgba(255, 192, 203, 0.9); /* Heavy neon glow on the front word */
}

/* Faking the camera pan with simple 2D movements */
@keyframes breathe {
  0% { transform: scale(0.95) rotate(-1deg) translateY(1%); }
  100% { transform: scale(1.05) rotate(1deg) translateY(-1%); }
}

</style>
</head>
<body>
 <div class="bg">
  <div class="tunnel">
    <span>KAKON</span>
    <span>KAKON</span>
    <span>KAKON</span>
    <span>KAKON</span>
    <span>KAKON</span>
  </div>
</div>
</body>
</html>
