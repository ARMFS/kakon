<!DOCTYPE html>
<html>
<head>
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
<title>KAKON</title>
<style>
body, html {
  height: 100%;
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
}

.bg {
  background-image: url("/hello.gif");
  height: 100%; 
  background-position: center;
  background-repeat: no-repeat;
  background-size: cover;
  
  /* Centers the whole stack perfectly on the screen */
  display: flex;
  justify-content: center;
  align-items: center;
}

.hello {
  display: flex;
  flex-direction: column; /* Stacks the words vertically */
  align-items: center;    /* Keeps them centered over each other */
  color: pink;
  line-height: 0.85;      /* Keeps the rows tucked closely together */
  margin: 0;
  font-weight: bold;
}

/* 7 rows total, growing progressively larger */
.hello span:nth-child(1) { font-size: clamp(8px, 1.5vw, 14px); }  /* Row 1 - Tiniest */
.hello span:nth-child(2) { font-size: clamp(12px, 2.5vw, 24px); } /* Row 2 */
.hello span:nth-child(3) { font-size: clamp(16px, 4vw, 40px); }   /* Row 3 */
.hello span:nth-child(4) { font-size: clamp(22px, 6vw, 70px); }   /* Row 4 */
.hello span:nth-child(5) { font-size: clamp(32px, 9vw, 120px); }  /* Row 5 */
.hello span:nth-child(6) { font-size: clamp(45px, 14vw, 200px); } /* Row 6 */
.hello span:nth-child(7) { font-size: clamp(60px, 22vw, 300px); } /* Row 7 - Massive */

</style>
</head>
<body>
 <div class="bg">
  <div class="hello">
    <span>KAKON</span>
    <span>KAKON</span>
    <span>KAKON</span>
    <span>KAKON</span>
    <span>KAKON</span>
    <span>KAKON</span>
    <span>KAKON</span>
  </div>
</div>
</body>
</html>
