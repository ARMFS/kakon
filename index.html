<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KAKON</title>
<style>
body, html {
  height: 100%;
  margin: 0;
  font-family: "Helvetica Neue", Arial, sans-serif;
  background-color: black;
  overflow: hidden;
}

.bg {
  background-image: url("/hello.gif");
  height: 100vh;
  width: 100vw;
  background-position: center;
  background-repeat: no-repeat;
  background-size: cover;
  
  -webkit-perspective: 1000px;
  perspective: 1000px; 
  
  display: flex;
  justify-content: center;
  align-items: center;
}

.tunnel {
  /* CSS Grid stacking - this fixes the offset/size bug */
  display: grid;
  place-items: center; 
  
  -webkit-transform-style: preserve-3d;
  transform-style: preserve-3d;
  
  -webkit-animation: breathe 8s infinite alternate ease-in-out;
  animation: breathe 8s infinite alternate ease-in-out;
}

.tunnel span {
  /* All spans occupy the same grid cell */
  grid-area: 1 / 1; 
  
  color: pink;
  font-weight: 900;
  font-size: clamp(50px, 18vw, 150px); 
  letter-spacing: 0.05em; 
  text-transform: uppercase;
  white-space: nowrap;
  mix-blend-mode: screen;
  
  /* Critical for Safari hardware centering */
  -webkit-backface-visibility: hidden;
  backface-visibility: hidden;
}

/* Depth assignments using pure translateZ (no more X/Y offsets) */
.tunnel span:nth-child(1) { -webkit-transform: translateZ(-1000px); transform: translateZ(-1000px); opacity: 0.1; -webkit-filter: blur(12px); filter: blur(12px); }
.tunnel span:nth-child(2) { -webkit-transform: translateZ(-700px);  transform: translateZ(-700px);  opacity: 0.3; -webkit-filter: blur(8px);  filter: blur(8px);  }
.tunnel span:nth-child(3) { -webkit-transform: translateZ(-400px);  transform: translateZ(-400px);  opacity: 0.5; -webkit-filter: blur(4px);  filter: blur(4px);  }
.tunnel span:nth-child(4) { -webkit-transform: translateZ(-150px);  transform: translateZ(-150px);  opacity: 0.8; -webkit-filter: blur(1px);  filter: blur(1px);  }

/* The Front "White" Core */
.tunnel span:nth-child(5) { 
  -webkit-transform: translateZ(0px); 
  transform: translateZ(0px); 
  color: #fff; /* True white core for that neon look */
  opacity: 1; 
  text-shadow: 0 0 20px pink, 0 0 40px pink;
  z-index: 10;
}

@-webkit-keyframes breathe {
  0% { -webkit-transform: rotateX(4deg) rotateY(-8deg) translateZ(-100px); }
  100% { -webkit-transform: rotateX(-4deg) rotateY(8deg) translateZ(100px); }
}

@keyframes breathe {
  0% { transform: rotateX(4deg) rotateY(-8deg) translateZ(-100px); }
  100% { transform: rotateX(-4deg) rotateY(8deg) translateZ(100px); }
}
</style>
</head>
<body>
 <div class="bg">
  <div class="tunnel">
    <span>KAKON</span>
    <span>KAKON</span>
    <span>KAKON</span>
    <span>KAKON</span>
    <span>KAKON</span>
  </div>
</div>
</body>
</html>
