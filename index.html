<!DOCTYPE html>
<html>
<head>
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
<title>KAKON</title>
<style>
body, html {
  height: 100%;
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
}

.bg {
  background-image: url("/hello.gif");
  height: 100%; 
  background-position: center;
  background-repeat: no-repeat;
  background-size: cover;
  
  /* Centers the whole stack perfectly on the screen */
  display: flex;
  justify-content: center;
  align-items: center;
}

.hello {
  display: flex;
  flex-direction: column; /* Stacks the words vertically */
  align-items: center;    /* Keeps them centered over each other */
  color: pink;
  line-height: 0.85;      /* Keeps the rows tucked closely together */
  margin: 0;
  font-weight: bold;
}

/* Targeting each row from top to bottom.
  The clamp() function ensures they still shrink nicely on phones!
*/
.hello span:nth-child(1) { font-size: clamp(20px, 5vw, 50px); }    /* Top row - Smallest */
.hello span:nth-child(2) { font-size: clamp(35px, 10vw, 100px); }  /* Second row */
.hello span:nth-child(3) { font-size: clamp(50px, 15vw, 180px); }  /* Third row */
.hello span:nth-child(4) { font-size: clamp(65px, 22vw, 300px); }  /* Bottom row - Biggest */

</style>
</head>
<body>
 <div class="bg">
  <div class="hello">
    <span>KAKON</span>
    <span>KAKON</span>
    <span>KAKON</span>
    <span>KAKON</span>
  </div>
</div>
</body>
</html>
