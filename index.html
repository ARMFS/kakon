<!DOCTYPE html>
<html>
<head>
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
<title>KAKON</title>
<style>
body, html {
  height: 100%;
  margin: 0;
  font-family: "Helvetica Neue", Arial, sans-serif;
  background-color: black;
  overflow: hidden; /* Keeps the page locked */
}

.bg {
  background-image: url("/hello.gif");
  height: 100vh; 
  width: 100vw;
  background-position: center;
  background-repeat: no-repeat;
  background-size: cover;
  
  -webkit-perspective: 800px;
  perspective: 800px; 
  
  /* CSS GRID FIX: Replaces Flexbox for bulletproof centering */
  display: grid;
  place-items: center;
}

.tunnel {
  /* CSS GRID FIX: Allows children to stack perfectly */
  display: grid;
  place-items: center;
  -webkit-transform-style: preserve-3d;
  transform-style: preserve-3d;
  -webkit-animation: breathe 8s infinite alternate ease-in-out;
  animation: breathe 8s infinite alternate ease-in-out;
}

.tunnel span {
  /* CSS GRID FIX: Stacks all 5 spans directly on top of each other without position: absolute */
  grid-area: 1 / 1; 
  
  color: #ffb6c1; /* Soft pink base */
  font-weight: 900;
  font-size: clamp(50px, 18vw, 150px); 
  letter-spacing: 1vw; 
  text-transform: uppercase;
  white-space: nowrap;
  
  /* A baseline soft glow for the background layers */
  text-shadow: 0 0 15px rgba(255, 192, 203, 0.4);
}

/* Because we used CSS grid, we REMOVED translate(-50%, -50%). Safari will love this. */
.tunnel span:nth-child(1) { 
  -webkit-transform: translateZ(-1200px);
  transform: translateZ(-1200px); 
  opacity: 0.1; filter: blur(12px); 
}
.tunnel span:nth-child(2) { 
  -webkit-transform: translateZ(-800px);
  transform: translateZ(-800px); 
  opacity: 0.3; filter: blur(8px); 
}
.tunnel span:nth-child(3) { 
  -webkit-transform: translateZ(-400px);
  transform: translateZ(-400px); 
  opacity: 0.5; filter: blur(4px); 
}
.tunnel span:nth-child(4) { 
  -webkit-transform: translateZ(-150px);
  transform: translateZ(-150px); 
  opacity: 0.8; filter: blur(1px); 
}
.tunnel span:nth-child(5) { 
  -webkit-transform: translateZ(0px);
  transform: translateZ(0px); 
  opacity: 1; 
  /* GLOW FIX: Intense, multi-layered text-shadow to replace blend-mode */
  text-shadow: 0 0 10px #ffb6c1, 0 0 30px #ff69b4, 0 0 60px #ff1493; 
}

@-webkit-keyframes breathe {
  0% { -webkit-transform: translateZ(-200px) rotateX(2deg) rotateY(-4deg); }
  100% { -webkit-transform: translateZ(100px) rotateX(-2deg) rotateY(4deg); }
}

@keyframes breathe {
  0% { transform: translateZ(-200px) rotateX(2deg) rotateY(-4deg); }
  100% { transform: translateZ(100px) rotateX(-2deg) rotateY(4deg); }
}
</style>
</head>
<body>
 <div class="bg">
  <div class="tunnel">
    <span>KAKON</span>
    <span>KAKON</span>
    <span>KAKON</span>
    <span>KAKON</span>
    <span>KAKON</span>
  </div>
</div>
</body>
</html>
