<!DOCTYPE html>
<html>
<head>
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
<title>KAKON</title>
<style>
body, html {
  height: 100%;
  margin: 0;
  font-family: "Helvetica Neue", Arial, sans-serif;
  background-color: black;
  overflow: hidden; 
}

.bg {
  background-image: url("/hello.gif");
  height: 100%;
  width: 100%;
  background-position: center;
  background-repeat: no-repeat;
  background-size: cover;
  
  -webkit-perspective: 800px;
  perspective: 800px;
  
  display: flex;
  justify-content: center;
  align-items: center;
}

.tunnel {
  position: relative;
  /* This prevents the "offset" bug on mobile by giving flexbox a perfect dead-center anchor */
  width: 0; 
  height: 0; 
  
  -webkit-transform-style: preserve-3d;
  transform-style: preserve-3d;
  -webkit-animation: breathe 8s infinite alternate ease-in-out;
  animation: breathe 8s infinite alternate ease-in-out;
}

.tunnel span {
  position: absolute;
  top: 50%; 
  left: 50%;
  
  /* THE SECRET SAUCE: Using semi-transparent RGBA instead of mix-blend-mode.
     This lets the layers ghost through each other to fake the 'screen' look! */
  color: rgba(255, 192, 203, 0.55); 
  
  font-weight: 900;
  font-size: clamp(50px, 18vw, 150px);
  letter-spacing: 1vw;
  text-transform: uppercase;
  white-space: nowrap;
}

.tunnel span:nth-child(1) { 
  -webkit-transform: translate(-50%, -50%) translateZ(-1200px);
  transform: translate(-50%, -50%) translateZ(-1200px); 
  opacity: 0.15; -webkit-filter: blur(12px); filter: blur(12px); 
}
.tunnel span:nth-child(2) { 
  -webkit-transform: translate(-50%, -50%) translateZ(-800px);
  transform: translate(-50%, -50%) translateZ(-800px); 
  opacity: 0.35; -webkit-filter: blur(8px); filter: blur(8px); 
}
.tunnel span:nth-child(3) { 
  -webkit-transform: translate(-50%, -50%) translateZ(-400px);
  transform: translate(-50%, -50%) translateZ(-400px); 
  opacity: 0.55; -webkit-filter: blur(4px); filter: blur(4px); 
}
.tunnel span:nth-child(4) { 
  -webkit-transform: translate(-50%, -50%) translateZ(-150px);
  transform: translate(-50%, -50%) translateZ(-150px); 
  opacity: 0.8; -webkit-filter: blur(1px); filter: blur(1px); 
}
.tunnel span:nth-child(5) { 
  -webkit-transform: translate(-50%, -50%) translateZ(0px);
  transform: translate(-50%, -50%) translateZ(0px); 
  opacity: 1; 
  /* Make the absolute front layer a bit more solid and give it a neon blast */
  color: rgba(255, 192, 203, 0.9);
  text-shadow: 0 0 15px rgba(255, 105, 180, 0.8), 0 0 30px rgba(255, 20, 147, 0.5); 
}

@-webkit-keyframes breathe {
  0%   { -webkit-transform: translateZ(-200px) rotateX(2deg) rotateY(-4deg); }
  100% { -webkit-transform: translateZ(100px) rotateX(-2deg) rotateY(4deg); }
}

@keyframes breathe {
  0%   { transform: translateZ(-200px) rotateX(2deg) rotateY(-4deg); }
  100% { transform: translateZ(100px) rotateX(-2deg) rotateY(4deg); }
}
</style>
</head>
<body>
 <div class="bg">
  <div class="tunnel">
    <span>KAKON</span>
    <span>KAKON</span>
    <span>KAKON</span>
    <span>KAKON</span>
    <span>KAKON</span>
  </div>
</div>
</body>
</html>
