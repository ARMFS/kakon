<!DOCTYPE html>
<html>
<head>
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
<title>KAKON</title>
<style>
body, html {
  height: 100%;
  margin: 0;
  font-family: "Helvetica Neue", Arial, sans-serif;
  overflow: hidden;
  background-color: black; /* Fills in any edges */
}

.bg {
  background-image: url("/hello.gif");
  height: 100%; 
  background-position: center;
  background-repeat: no-repeat;
  background-size: cover;
  
  /* This creates the 3D camera lens for the entire page */
  perspective: 800px; 
  display: flex;
  justify-content: center;
  align-items: center;
}

.tunnel {
  position: relative;
  /* This tells the container to respect the 3D space */
  transform-style: preserve-3d;
  /* A slow, creeping animation that moves the whole stack */
  animation: breathe 8s infinite alternate ease-in-out;
}

/* Base styling for every layer */
.tunnel span {
  position: absolute;
  top: 50%;
  left: 50%;
  color: pink;
  font-weight: 900;
  letter-spacing: 2vw; /* Stretches the letters wide */
  text-transform: uppercase;
  white-space: nowrap;
  mix-blend-mode: screen; /* Makes the pinks glow brightly when they overlap */
}

/* Pushing each word deeper into the Z-axis (into the screen) 
   and blurring the ones furthest away! */
.tunnel span:nth-child(1) { 
  font-size: 20vw; 
  transform: translate(-50%, -50%) translateZ(-3000px); 
  opacity: 0.1; 
  filter: blur(12px); 
}
.tunnel span:nth-child(2) { 
  font-size: 20vw; 
  transform: translate(-50%, -50%) translateZ(-2000px); 
  opacity: 0.2; 
  filter: blur(8px); 
}
.tunnel span:nth-child(3) { 
  font-size: 20vw; 
  transform: translate(-50%, -50%) translateZ(-1000px); 
  opacity: 0.4; 
  filter: blur(4px); 
}
.tunnel span:nth-child(4) { 
  font-size: 20vw; 
  transform: translate(-50%, -50%) translateZ(-500px); 
  opacity: 0.7; 
  filter: blur(1px); 
}
.tunnel span:nth-child(5) { 
  font-size: 22vw; 
  transform: translate(-50%, -50%) translateZ(0px); 
  opacity: 1; 
  text-shadow: 0 0 30px rgba(255, 192, 203, 0.6); /* Gives the front word a heavy neon glow */
}

/* The magic animation: smoothly pans the camera slightly left/right and zooms in/out */
@keyframes breathe {
  0% { transform: translateZ(-300px) rotateX(2deg) rotateY(-4deg); }
  100% { transform: translateZ(200px) rotateX(-2deg) rotateY(4deg); }
}

</style>
</head>
<body>
 <div class="bg">
  <div class="tunnel">
    <span>KAKON</span>
    <span>KAKON</span>
    <span>KAKON</span>
    <span>KAKON</span>
    <span>KAKON</span>
  </div>
</div>
</body>
</html>
