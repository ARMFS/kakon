<!DOCTYPE html>
<html>
<head>
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
<title>KAKON</title>
<style>
body, html {
  height: 100%;
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  overflow: hidden; /* Prevents a scrollbar from appearing if the tiny text hits the top */
}

.bg {
  background-image: url("/hello.gif");
  height: 100%; 
  background-position: center;
  background-repeat: no-repeat;
  background-size: cover;
  
  /* Centers our main anchor perfectly */
  display: flex;
  justify-content: center;
  align-items: center;
}

.center-anchor {
  position: relative;
  color: pink;
  font-weight: bold;
  text-align: center;
  /* Loosened this up from 0.85 to 0.95 to stop the awkward blending */
  line-height: 0.95; 
}

/* The giant word that sits right in the center */
.main-word {
  font-size: clamp(60px, 22vw, 300px);
  display: block;
}

/* The container for the smaller words shooting up */
.stack-up {
  position: absolute;
  /* Starts just above the giant word */
  bottom: 95%; 
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100vw;
}

/* 7 smaller rows now, making it taller. 
   Using margin-bottom to increase the gap as the text gets bigger! */
.stack-up span:nth-child(1) { font-size: clamp(8px, 1.2vw, 12px); margin-bottom: 2px; }
.stack-up span:nth-child(2) { font-size: clamp(12px, 2vw, 20px); margin-bottom: 4px; }
.stack-up span:nth-child(3) { font-size: clamp(18px, 3.5vw, 35px); margin-bottom: 6px; }
.stack-up span:nth-child(4) { font-size: clamp(26px, 5.5vw, 60px); margin-bottom: 10px; }
.stack-up span:nth-child(5) { font-size: clamp(38px, 8vw, 95px); margin-bottom: 15px; }
.stack-up span:nth-child(6) { font-size: clamp(52px, 12vw, 140px); margin-bottom: 20px; }
.stack-up span:nth-child(7) { font-size: clamp(68px, 17vw, 200px); margin-bottom: 25px; }

</style>
</head>
<body>
 <div class="bg">
  
  <div class="center-anchor">
    
    <div class="stack-up">
      <span>KAKON</span>
      <span>KAKON</span>
      <span>KAKON</span>
      <span>KAKON</span>
      <span>KAKON</span>
      <span>KAKON</span>
      <span>KAKON</span>
    </div>

    <span class="main-word">KAKON</span>
    
  </div>

</div>
</body>
</html>
