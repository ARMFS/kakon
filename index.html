<!DOCTYPE html>
<html>
<head>
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
<title>KAKON</title>
<style>
*, *::before, *::after {
  box-sizing: border-box;
}

body, html {
  height: 100%;
  margin: 0;
  font-family: "Helvetica Neue", Arial, sans-serif;
  background-color: black;
  overflow: hidden; /* ← overflow stays HERE on body, NOT on the perspective container */
}

/* NEW: this outer wrapper clips content without touching perspective */
.clip {
  position: fixed;
  inset: 0;
  overflow: hidden;
}

.bg {
  background-image: url("/hello.gif");
  height: 100%;
  width: 100%;
  background-position: center;
  background-repeat: no-repeat;
  background-size: cover;
  background-attachment: scroll; /* 'fixed' breaks on iOS — always use scroll */

  /* NO overflow: hidden here — that's what was killing iOS 3D */
  
  -webkit-perspective: 800px;
  perspective: 800px;
  
  display: flex;
  justify-content: center;
  align-items: center;
}

.tunnel {
  position: relative;
  -webkit-transform-style: preserve-3d;
  transform-style: preserve-3d;
  animation: breathe 8s infinite alternate ease-in-out;
  /* Force GPU compositing on iOS */
  -webkit-backface-visibility: hidden;
  backface-visibility: hidden;
  will-change: transform;
}

.tunnel span {
  position: absolute;
  top: 50%;
  left: 50%;
  color: pink;
  font-weight: 900;
  font-size: clamp(40px, 15vw, 150px);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  white-space: nowrap;
  mix-blend-mode: screen;
  -webkit-backface-visibility: hidden;
  backface-visibility: hidden;
}

.tunnel span:nth-child(1) { transform: translate(-50%, -50%) translateZ(-1200px); opacity: 0.1; filter: blur(12px); }
.tunnel span:nth-child(2) { transform: translate(-50%, -50%) translateZ(-800px);  opacity: 0.3; filter: blur(8px);  }
.tunnel span:nth-child(3) { transform: translate(-50%, -50%) translateZ(-400px);  opacity: 0.5; filter: blur(4px);  }
.tunnel span:nth-child(4) { transform: translate(-50%, -50%) translateZ(-150px);  opacity: 0.8; filter: blur(1px);  }
.tunnel span:nth-child(5) { 
  transform: translate(-50%, -50%) translateZ(0px); 
  opacity: 1; 
  text-shadow: 0 0 25px rgba(255, 192, 203, 0.8); 
}

@keyframes breathe {
  0%   { transform: translateZ(-200px) rotateX(2deg)  rotateY(-4deg); }
  100% { transform: translateZ(100px)  rotateX(-2deg) rotateY(4deg);  }
}
</style>
</head>
<body>
  <div class="clip">       <!-- clips without breaking 3D -->
    <div class="bg">
      <div class="tunnel">
        <span>KAKON</span>
        <span>KAKON</span>
        <span>KAKON</span>
        <span>KAKON</span>
        <span>KAKON</span>
      </div>
    </div>
  </div>
</body>
</html>
