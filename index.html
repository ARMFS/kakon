<!DOCTYPE html>
<html>
<head>
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
<title>KAKON</title>
<style>
body, html {
  height: 100%;
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
}

.bg {
  background-image: url("/hello.gif");
  height: 100%; 
  background-position: center;
  background-repeat: no-repeat;
  background-size: cover;
}

.hello {
  text-align: center;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: pink;
  width: 100%; /* Ensures the container spans the full screen width */
}

/* Added responsive styling for the heading */
h1 {
  margin: 0;
  /* This tells the text to be 18% of the screen width, 
     but never shrink below 50px or grow above 300px */
  font-size: clamp(50px, 18vw, 300px); 
}
</style>
</head>
<body>
 <div class="bg">
  <div class="hello">
    <h1>KAKON</h1>
  </div>
</div>
</body>
</html>
