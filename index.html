<!DOCTYPE html>
<html>
<head>
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
<title>KAKON</title>
<style>
body, html {
  height: 100%;
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
}

.bg {
  background-image: url("/hello.gif");
  height: 100%; 
  background-position: center;
  background-repeat: no-repeat;
  background-size: cover;
  
  display: flex;
  justify-content: center;
  align-items: center;
}

.hello {
  display: flex;
  flex-direction: column; 
  align-items: center;    
  color: pink;
  line-height: 0.85;      
  margin: 0;
  font-weight: bold;
}

/* The sizing stays exactly the same. 
  The SVG in the first span will use this font-size to set its height! 
*/
.hello span:nth-child(1) { font-size: clamp(20px, 4vw, 50px); }   /* Electric Symbol */
.hello span:nth-child(2) { font-size: clamp(40px, 8vw, 100px); }  /* A */
.hello span:nth-child(3) { font-size: clamp(60px, 14vw, 170px); } /* K */
.hello span:nth-child(4) { font-size: clamp(80px, 22vw, 250px); } /* O */
.hello span:nth-child(5) { font-size: clamp(100px, 32vw, 350px); } /* N */

/* Makes sure the SVG acts exactly like a letter of text */
.electric-icon {
  height: 1em; /* 1em means "make this exactly the height of the font-size" */
  width: auto;
  fill: currentColor; /* Forces it to use your pink color */
  display: block;
}

</style>
</head>
<body>
 <div class="bg">
  <div class="hello">
    
    <span>
      <svg class="electric-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M13 2L3 14h7v8l11-12h-7l4-8z"/>
      </svg>
    </span>
    
    <span>A</span>
    <span>K</span>
    <span>O</span>
    <span>N</span>
    
  </div>
</div>
</body>
</html>
