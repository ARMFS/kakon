<!DOCTYPE html>
<html>
<head>
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
<title>KAKON</title>
<style>
body, html {
  height: 100%;
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
}

.bg {
  background-image: url("/hello.gif");
  height: 100%; 
  background-position: center;
  background-repeat: no-repeat;
  background-size: cover;
  
  /* Flexbox makes it super easy to center the whole stack perfectly */
  display: flex;
  justify-content: center;
  align-items: center;
}

.hello {
  display: flex;
  flex-direction: column; /* Stacks the letters vertically */
  align-items: center;    /* Keeps the letters centered over each other */
  color: pink;
  line-height: 0.85;      /* Tightens the vertical gap between the letters */
  margin: 0;
  font-weight: bold;
}

/* Targeting each letter individually.
  Using clamp() so they scale up/down smoothly based on screen size!
*/
.hello span:nth-child(1) { font-size: clamp(20px, 4vw, 50px); }   /* K - Smallest */
.hello span:nth-child(2) { font-size: clamp(40px, 8vw, 100px); }  /* A */
.hello span:nth-child(3) { font-size: clamp(60px, 14vw, 170px); } /* K */
.hello span:nth-child(4) { font-size: clamp(80px, 22vw, 250px); } /* O */
.hello span:nth-child(5) { font-size: clamp(100px, 32vw, 350px); } /* N - Biggest */

</style>
</head>
<body>
 <div class="bg">
  <div class="hello">
    <span>K</span>
    <span>A</span>
    <span>K</span>
    <span>O</span>
    <span>N</span>
  </div>
</div>
</body>
</html>
