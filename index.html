<!DOCTYPE html>
<html>
<head>
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
<title>KAKON</title>
<style>
body, html {
  height: 100%;
  margin: 0;
  font-family: "Helvetica Neue", Arial, sans-serif;
  background-color: black;
  /* REMOVED overflow: hidden from here to fix the Safari 3D bug! */
}

.bg {
  background-image: url("/hello.gif");
  height: 100vh; /* Locks the height to the screen size */
  width: 100vw;
  background-position: center;
  background-repeat: no-repeat;
  background-size: cover;
  
  /* Moved overflow here so it doesn't break iOS 3D */
  overflow: hidden; 
  
  /* Camera lens, added -webkit- for iPhones */
  -webkit-perspective: 800px;
  perspective: 800px; 
  
  display: flex;
  justify-content: center;
  align-items: center;
}

.tunnel {
  position: relative;
  /* Added -webkit- prefix to force 3D on Apple devices */
  -webkit-transform-style: preserve-3d;
  transform-style: preserve-3d;
  animation: breathe 8s infinite alternate ease-in-out;
}

.tunnel span {
  position: absolute;
  top: 50%;
  left: 50%;
  color: pink;
  font-weight: 900;
  /* Switched to clamp() so the text scales nicely on both phone and desktop */
  font-size: clamp(50px, 18vw, 150px); 
  letter-spacing: 1vw; 
  text-transform: uppercase;
  white-space: nowrap;
  mix-blend-mode: screen;
}

/* Tuned the Z-axis depths (-1200px max) so it fits beautifully 
  inside a mobile screen without looking smashed.
*/
.tunnel span:nth-child(1) { 
  transform: translate(-50%, -50%) translateZ(-1200px); 
  opacity: 0.1; filter: blur(12px); 
}
.tunnel span:nth-child(2) { 
  transform: translate(-50%, -50%) translateZ(-800px); 
  opacity: 0.3; filter: blur(8px); 
}
.tunnel span:nth-child(3) { 
  transform: translate(-50%, -50%) translateZ(-400px); 
  opacity: 0.5; filter: blur(4px); 
}
.tunnel span:nth-child(4) { 
  transform: translate(-50%, -50%) translateZ(-150px); 
  opacity: 0.8; filter: blur(1px); 
}
.tunnel span:nth-child(5) { 
  transform: translate(-50%, -50%) translateZ(0px); 
  opacity: 1; 
  text-shadow: 0 0 25px rgba(255, 192, 203, 0.8); 
}

/* Smoothed out the breathing animation for mobile viewing */
@keyframes breathe {
  0% { transform: translateZ(-200px) rotateX(2deg) rotateY(-4deg); }
  100% { transform: translateZ(100px) rotateX(-2deg) rotateY(4deg); }
}

</style>
</head>
<body>
 <div class="bg">
  <div class="tunnel">
    <span>KAKON</span>
    <span>KAKON</span>
    <span>KAKON</span>
    <span>KAKON</span>
    <span>KAKON</span>
  </div>
</div>
</body>
</html>
